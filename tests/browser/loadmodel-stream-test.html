<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>loadModel → createStreamDenoiser E2E Test</title>
</head>
<body>
  <button id="startBtn">Start Test</button>
  <div id="result"></div>
  <script type="module">
    import { loadModel } from '/dist/api/loader.js';

    document.getElementById('startBtn').addEventListener('click', async () => {
      const resultEl = document.getElementById('result');
      const lines = [];
      let allOk = true;

      function check(name, condition) {
        if (condition) {
          lines.push('OK: ' + name);
        } else {
          lines.push('FAIL: ' + name);
          allOk = false;
        }
      }

      let inputCtx = null;
      try {
        const model = await loadModel('tiny', { baseUrl: '/flat/' });

        // Expose raw data for Playwright evaluate()
        window.__testData = {
          size: model.size,
          sampleRate: model.sampleRate,
          hopSize: model.hopSize,
          nFft: model.nFft,
          wasmBytesLength: model.wasmBytes?.byteLength ?? 0,
          weightDataLength: model.weightData?.byteLength ?? 0,
          exportMapKeys: Object.keys(model.exportMap || {}),
          hasWasmFactory: typeof model.wasmFactory === 'function',
          hasCreateDenoiser: typeof model.createDenoiser === 'function',
          hasCreateStreamDenoiser: typeof model.createStreamDenoiser === 'function',
        };

        check('modelSizeTiny', model.size === 'tiny');
        check('sampleRate48k', model.sampleRate === 48000);
        check('hopSize512', model.hopSize === 512);
        check('nFft1024', model.nFft === 1024);
        check('wasmBytesExist', model.wasmBytes instanceof ArrayBuffer && model.wasmBytes.byteLength > 0);
        check('weightDataExist', model.weightData instanceof ArrayBuffer && model.weightData.byteLength > 0);
        check('exportMapExist', typeof model.exportMap === 'object' && Object.keys(model.exportMap).length > 0);
        check('wasmFactoryFn', typeof model.wasmFactory === 'function');
        check('createDenoiserFn', typeof model.createDenoiser === 'function');
        check('createStreamDenoiserFn', typeof model.createStreamDenoiser === 'function');

        inputCtx = new AudioContext({ sampleRate: 48000 });
        const osc = inputCtx.createOscillator();
        osc.frequency.value = 440;
        const dest = inputCtx.createMediaStreamDestination();
        osc.connect(dest);
        osc.start();

        const stream = await model.createStreamDenoiser(dest.stream, {
          workletUrl: '/dist/worklet/processor.js',
        });

        check('outputStreamExists', stream.outputStream instanceof MediaStream);
        check('outputStreamHasTracks', stream.outputStream.getAudioTracks().length > 0);
        check('stateRunning', stream.state === 'running');

        window.__testData.streamOutputType = stream.outputStream?.constructor?.name;
        window.__testData.streamTrackCount = stream.outputStream?.getAudioTracks?.()?.length ?? 0;
        window.__testData.streamState = stream.state;

        stream.bypass = true;
        check('bypassOn', stream.bypass === true);
        stream.bypass = false;
        check('bypassOff', stream.bypass === false);

        stream.destroy();
        check('stateDestroyed', stream.state === 'destroyed');
        window.__testData.stateAfterDestroy = stream.state;
        window.__testData.completed = true;

        osc.stop();
      } catch (err) {
        lines.push('FAIL: ' + err.message);
        allOk = false;
      } finally {
        if (inputCtx) inputCtx.close().catch(() => {});
      }

      lines.push(allOk
        ? '[PASS] loadModel stream test passed!'
        : '[FAIL] loadModel stream test failed');
      resultEl.textContent = lines.join('\n');
    });
  </script>
</body>
</html>
