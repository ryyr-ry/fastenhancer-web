# This workflow uses pre-built embedded assets (src/embedded/) committed to git.
# WASM compilation (emcc) is NOT run in CI — rebuild locally with `bun run build:wasm:all`
# when C engine sources change, then commit the updated embedded assets.
name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - 'dist/**'
      - 'weights/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # pin: v4.2.2

      - uses: oven-sh/setup-bun@v2  # pin: v2.1.1
        with:
          bun-version: "1.3.11"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bunx vitest run

      - name: Build TypeScript
        run: bunx tsc && node -e "require('fs').cpSync('src/worklet/processor.js','dist/worklet/processor.js')"

      - name: Install demo dependencies
        working-directory: demo
        run: bun install --frozen-lockfile

      - name: Build demo
        working-directory: demo
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # pin: v3.0.1
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # pin: v4.0.5
