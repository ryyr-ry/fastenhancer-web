# Publish to npm on GitHub Release creation.
#
# Authentication modes (auto-detected):
#   1. Token-based (initial publish):
#      - Create npm Automation token at https://www.npmjs.com/settings/~/tokens
#      - Add as GitHub secret NPM_TOKEN in repo Settings > Secrets
#
#   2. OIDC Trusted Publishing (after first publish):
#      - Go to https://www.npmjs.com/package/fastenhancer-web/access
#      - Add Trusted Publisher: owner=ryyr-ry, repo=fastenhancer-web, workflow=publish.yml
#      - Delete NPM_TOKEN secret from GitHub (empty string blocks OIDC)
#
# Build note: src/embedded/*.ts (base64-encoded WASM + weights) are tracked in git.
# Full WASM rebuild (emcc) is NOT needed — tsc alone produces a publishable dist/.
name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # pin: v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2  # pin: v2.1.1
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript
        run: |
          tsc
          node -e "require('fs').cpSync('src/worklet/processor.js','dist/worklet/processor.js')"

      - name: Verify dist/embedded exists
        run: |
          COUNT=$(find dist/embedded -name '*.js' | wc -l)
          if [ "$COUNT" -lt 10 ]; then
            echo "::error::Expected 10+ embedded JS files, found $COUNT"
            exit 1
          fi
          echo "Found $COUNT embedded JS files in dist/embedded/"

      - name: Verify version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4  # pin: v4.4.0
        with:
          node-version: "22"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Publish to npm
        shell: bash
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "Authenticating with npm token..."
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> "$HOME/.npmrc"
          else
            echo "Authenticating with OIDC trusted publishing..."
          fi
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
